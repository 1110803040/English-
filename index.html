<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>40題選擇題練習系統</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .quiz-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .question { font-size: 1.2rem; margin-bottom: 20px; font-weight: bold; }
        .option { display: block; background: #e9ecef; margin: 10px 0; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .option:hover { background: #dee2e6; }
        .option.selected { border-color: #007bff; background: #cfe2ff; }
        .controls { margin-top: 20px; display: flex; justify-content: space-between; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        .next-btn { background: #007bff; color: white; }
        .prev-btn { background: #6c757d; color: white; }
        .progress { margin-bottom: 20px; color: #666; }
        #result { text-align: center; display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-box">
        <div class="progress" id="progress">第 1 / 40 題</div>
        <div class="question" id="question-text">載入中...</div>
        <div id="options-container"></div>
        <div class="controls">
            <button class="prev-btn" onclick="prevQuestion()">上一題</button>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題</button>
        </div>
    </div>

    <div id="result">
        <h2>測驗結束！</h2>
        <p id="score-display"></p>
        <button onclick="location.reload()" style="background:#28a745; color:white;">重新挑戰</button>
    </div>
</div>

<script src="questions.js"></script>
<script src="script.js"></script>
</body>
</html>
