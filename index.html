<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英文期中考練習系統 - 39題精準版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .question-card { transition: all 0.3s ease; }
        input[type="radio"]:checked + label {
            background-color: #eff6ff;
            border-color: #3b82f6;
            color: #1e40af;
        }
    </style>
</head>
<body class="py-6 px-4">

    <div class="max-w-2xl mx-auto">
        <!-- 標題區 -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-6">
            <h1 class="text-2xl font-black text-slate-800">英文期中考新增題庫練習</h1>
            <p class="text-slate-500 text-sm mt-1">共 39 題（完全依據圖片教材編製），每題約 2.56 分，滿分 100 分。請由上往下作答，完成後點擊最下方提交。</p>
        </div>

        <!-- 題目列表 -->
        <form id="quizForm" class="space-y-4">
            <div id="quizContainer">
                <!-- 題目動態生成 -->
            </div>

            <!-- 提交按鈕 -->
            <button type="button" id="submitBtn" onclick="calculateScore()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-[0.98] transition-all mt-8">
                交卷並計算分數
            </button>
        </form>

        <!-- 結果彈出視窗 -->
        <div id="resultModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-md text-center shadow-2xl">
                <h2 class="text-2xl font-bold text-slate-800">測驗成績</h2>
                <div class="my-6">
                    <span id="finalScore" class="text-7xl font-black text-blue-600">0</span>
                    <span class="text-slate-400 font-bold">/100</span>
                </div>
                <p id="resultComment" class="text-slate-500 mb-8"></p>
                <div class="space-y-3">
                    <button onclick="closeResult()" class="w-full bg-slate-100 text-slate-700 py-4 rounded-2xl font-bold hover:bg-slate-200 transition">查看對錯與解析</button>
                    <button onclick="location.reload()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition">重新練習</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 完全對照圖片中圈選的正確答案 (共39題)
        const quizData = [
            // EXERCISE F (Image 1, 2, 3)
            { q: "I hate wearing a suit and tie. That's why I don't like _______ situations.", o: ["national", "disciplined", "formal", "international"], a: 2 },
            { q: "The meeting was mandatory.", o: ["We wanted to go.", "We indicated the time.", "We had to go.", "We didn't attend."], a: 2 },
            { q: "The national anthem is usually _______.", o: ["heard at parades", "seen at work", "given at weddings", "bought at stores"], a: 0 },
            { q: "The students _______ in front of the flags before they got on the buses.", o: ["gathered", "associated", "supported", "preceded"], a: 0 },
            { q: "The group that _______ in the ceremony wore _______ uniforms.", o: ["participated, Class A", "protected, informal", "governed, mandatory", "placed, informal"], a: 0 },
            { q: "Basic training teaches soldiers to be very _______.", o: ["international", "disciplined", "informal", "confirmed"], a: 1 },
            { q: "My family always _______ me when I have a problem.", o: ["sets", "supports", "gathers", "flies"], a: 1 },
            { q: "High school precedes _______.", o: ["middle school", "elementary school", "college", "junior high school"], a: 2 },
            { q: "_______ your right hand over your _______ when the flag passes.", o: ["Fly, nation", "Gather, display", "Place, heart", "Set, symbol"], a: 2 },
            { q: "Ron Boland has governed _______.", o: ["the discipline of the basic trainees", "the national anthem and the flag", "all of the senior NCOs on base", "the city of Funkton for 16 great years"], a: 3 },
            { q: "There were 12 _______ in NATO when it began in 1949.", o: ["nations", "parades", "retreats", "displays"], a: 0 },
            { q: "Pat received his _______ orders from the military. He's leaving next week.", o: ["disciplined", "informal", "national", "official"], a: 3 },
            { q: "The party is very informal.", o: ["You can wear jeans and a T-shirt.", "You must wear your Class A uniform.", "You should wear a suit and tie.", "Don't bring your running shoes."], a: 0 },
            { q: "My father flies _______ in front of our house.", o: ["the flag", "his heart", "the anthem", "his car"], a: 0 },
            { q: "The _______ gives all military personnel extra pay for overseas duty.", o: ["parade", "anthem", "gathering", "government"], a: 3 },
            { q: "He doesn't have any debt because _______.", o: ["he doesn't put money in the bank", "he paid all his bills", "he needs to pay his bills", "he doesn't earn much money"], a: 1 },
            { q: "The colors of the US _______ are red, white, and blue.", o: ["flag", "money", "anthem", "weather"], a: 0 },
            { q: "We're all going to see the _______ downtown. Our neighbor will be marching in it.", o: ["display", "position", "parade", "flag"], a: 2 },
            { q: "General Otis is our base _______.", o: ["anthem", "discipline", "government", "commander"], a: 3 },
            { q: "My _______ is that we must support the military.", o: ["position", "heart", "occasion", "indicate"], a: 0 },

            // EXERCISE C (Image 4)
            { q: "A new hospital will _______ next to the police station.", o: ["build", "be built", "is builded"], a: 1 },
            { q: "This patient _______ by Thursday.", o: ["must is seen", "must seen", "must be seen"], a: 2 },
            { q: "Five players _______ by the coach for the new team.", o: ["selected", "be will select", "will be selected"], a: 2 },
            { q: "Uniforms _______ worn on weekends.", o: ["don't have to be", "have to", "do have to"], a: 0 },
            { q: "Children _______ care of by their parents.", o: ["must to take", "must took", "must be taken"], a: 2 },

            // EXERCISE G (Image 5, 6)
            { q: "The _______ for the garbage disposal is on the wall.", o: ["flag", "switch", "quality", "judgment"], a: 1 },
            { q: "My watch has stopped. I need a new _______.", o: ["mustache", "cord", "battery", "efficiency"], a: 2 },
            { q: "I need to tighten these screws. Can you hand me the _______?", o: ["pen", "hanger", "air conditioner", "screwdriver"], a: 3 },
            { q: "Electricity has many _______ in a home.", o: ["faces", "arguments", "uses", "occasions"], a: 2 },
            { q: "I need my book back. Are you _______ with it yet?", o: ["through", "friendly", "insulated", "charged"], a: 0 },
            { q: "Does the bus _______ on electricity or gasoline?", o: ["conduct", "run", "fly", "protect"], a: 1 },
            { q: "She _______ her hair color from brown to blonde.", o: ["light", "lightest", "lightened", "lightly"], a: 2 },
            { q: "How do I _______ the printer to the computer?", o: ["insulate", "attach", "help", "consider"], a: 1 },
            { q: "The small battery doesn't have a very strong _______.", o: ["current", "demand", "problem", "lease"], a: 0 },
            { q: "Don't use your _______ hair dryer near the bathtub.", o: ["dishonest", "furnished", "formal", "electric"], a: 3 },
            { q: "The builder put thick _______ under the roof of the new house.", o: ["shorts", "insulation", "generators", "garbage"], a: 1 },
            { q: "There are many _______ which are made from corn.", o: ["observations", "uses", "products", "power"], a: 2 },
            { q: "Brian put the cord _______ the hole in the wall.", o: ["under", "at", "through", "over"], a: 2 },
            { q: "You have to _______ the doorknob to open the door.", o: ["slice", "power", "charge", "twist"], a: 3 }
        ];

        function initQuiz() {
            const container = document.getElementById("quizContainer");
            quizData.forEach((item, qIdx) => {
                const qDiv = document.createElement("div");
                qDiv.className = "question-card bg-white rounded-2xl p-6 shadow-sm border border-slate-100 mb-4";
                qDiv.innerHTML = `
                    <p class="font-bold text-slate-800 mb-4">${qIdx + 1}. ${item.q}</p>
                    <div class="grid gap-2" id="q${qIdx}_options">
                        ${item.o.map((opt, oIdx) => `
                            <div class="relative">
                                <input type="radio" name="q${qIdx}" id="q${qIdx}_o${oIdx}" value="${oIdx}" class="hidden peer">
                                <label for="q${qIdx}_o${oIdx}" class="block p-4 border-2 border-slate-50 bg-slate-50 rounded-xl cursor-pointer text-slate-600 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 transition-all font-medium">
                                    ${opt}
                                </label>
                            </div>
                        `).join('')}
                    </div>
                    <div id="ans_${qIdx}" class="hidden mt-3 p-3 rounded-lg text-sm font-bold"></div>
                `;
                container.appendChild(qDiv);
            });
        }

        function calculateScore() {
            let correctCount = 0;
            quizData.forEach((item, qIdx) => {
                const selected = document.querySelector(`input[name="q${qIdx}"]:checked`);
                const ansDiv = document.getElementById(`ans_${qIdx}`);
                ansDiv.classList.remove("hidden");
                
                if (selected && parseInt(selected.value) === item.a) {
                    correctCount++;
                    ansDiv.innerText = "正確！✨";
                    ansDiv.className = "mt-3 p-3 rounded-lg text-sm font-bold bg-green-50 text-green-700";
                } else {
                    ansDiv.innerText = `錯誤 ❌ 正確答案是：${item.o[item.a]}`;
                    ansDiv.className = "mt-3 p-3 rounded-lg text-sm font-bold bg-red-50 text-red-700";
                }
            });

            // 以 39 題換算百分制分數
            let finalScore = Math.round((correctCount / quizData.length) * 100);

            document.getElementById("finalScore").innerText = finalScore;
            document.getElementById("resultComment").innerText = finalScore >= 60 ? "表現優異，期中考沒問題的！" : "沒關係，重新練習幾次熟悉圖片生字吧！";
            document.getElementById("resultModal").classList.remove("hidden");
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeResult() {
            document.getElementById("resultModal").classList.add("hidden");
        }

        initQuiz();
    </script>
</body>
</html>
